openapi: 3.1.0
info:
  title: Crypto Market META MCP (x402)
  version: 0.1.0
  description: |
    Pay-per-call x402 META-aggregator: composes 5 already-shipped MT
    services (coinpaprika + coincap + coinlore + cryptocompare + kraken) in
    parallel into a single cross-feed consensus price per symbol (median
    + mean + spread). Settle USDC on Base via x402.
servers:
  - url: https://crypto-market-meta-mcp.mtree.workers.dev
x-pricing:
  - path: /v1/crypto/consensus
    method: POST
    price: $0.10
    amount: "0.10"
    asset: USDC
    network: base
  - path: /v1/crypto/consensus_summary
    method: POST
    price: $0.05
    amount: "0.05"
    asset: USDC
    network: base
paths:
  /healthz:
    get: { summary: Service health, responses: { "200": { description: OK } } }
  /v1/crypto/consensus:
    post:
      summary: Cross-feed crypto consensus price (5-feed fan-out)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol]
              properties: { symbol: { type: string, description: "Crypto ticker symbol (BTC, ETH, SOL, USDC)" } }
      responses:
        "200": { description: Consensus price + per-feed envelopes }
        "402": { description: Payment required (x402 envelope) }
  /v1/crypto/consensus_summary:
    post:
      summary: Plain-English consensus summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol]
              properties: { symbol: { type: string } }
      responses:
        "200": { description: Plain-English summary + consensus }
        "402": { description: Payment required (x402 envelope) }
