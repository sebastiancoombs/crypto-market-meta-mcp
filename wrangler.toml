name = "crypto-market-meta-mcp"
main = "src/worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.yaml", "**/*.yml"]
fallthrough = true

[vars]
X402_NETWORK = "base"
UPSTREAM_TIMEOUT_MS = "8000"

[[d1_databases]]
binding = "PAID_CALLS_DB"
database_name = "money-tree-paid-calls"
database_id = "1e9ad254-6608-44a4-b5ac-9999fc88e8b5"
